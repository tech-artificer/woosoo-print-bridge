name: woosoo_relay_device
description: Woosoo Relay Device - autonomous print relay for Bluetooth thermal printers.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  go_router: ^17.0.1

  http: ^1.2.2
  web_socket_channel: ^3.0.3

  shared_preferences: ^2.3.2
  sembast: ^3.8.5+2
  path_provider: ^2.1.4
  synchronized: ^3.1.0

  permission_handler: ^12.0.1
  connectivity_plus: ^6.0.0
  wakelock_plus: ^1.2.8

  logger: ^2.1.0
  intl: ^0.20.1
  share_plus: ^10.1.3

  blue_thermal_printer: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
